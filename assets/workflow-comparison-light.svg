<svg width="100%" viewBox="0 0 800 560" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
<title>How /compact, /fork and /new-thread each handle a session off-shoot</title>
<desc>Three stacked timelines. /compact summarises in place. /fork branches the whole context. /new-thread keeps your main thread clean while a long independent spawn does the heavy work — only the answer returns.</desc>
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ar-sm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Card -->
<rect x="2" y="2" width="796" height="556" rx="12" fill="#ffffff" stroke="#E5E5E0"/>
<text x="24" y="34" font-size="16" font-weight="500" fill="#2C2C2A">Three ways to handle an off-shoot</text>
<line x1="24" y1="48" x2="776" y2="48" stroke="#E5E5E0"/>

<!-- ─── /compact ─── -->
<text x="24" y="84" font-size="14" font-weight="500" fill="#185FA5">/compact</text>
<text x="24" y="100" font-size="11" fill="#888780">one thread</text>

<rect x="190" y="70" width="130" height="36" rx="5" fill="#F1EFE8" stroke="#B4B2A9"/>
<text x="255" y="83" font-size="11" fill="#444441" text-anchor="middle" dominant-baseline="central">session grows</text>
<circle cx="218" cy="95" r="2" fill="#B4B2A9"/>
<circle cx="226" cy="95" r="2" fill="#B4B2A9"/>
<circle cx="234" cy="95" r="2" fill="#B4B2A9"/>
<circle cx="242" cy="95" r="2" fill="#B4B2A9"/>
<circle cx="250" cy="95" r="2" fill="#B4B2A9"/>
<circle cx="258" cy="95" r="2" fill="#B4B2A9"/>
<circle cx="266" cy="95" r="2" fill="#B4B2A9"/>
<circle cx="274" cy="95" r="2" fill="#B4B2A9"/>

<line x1="322" y1="88" x2="350" y2="88" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>

<rect x="352" y="72" width="80" height="32" rx="5" fill="#FAEEDA" stroke="#EF9F27"/>
<text x="392" y="88" font-size="11" fill="#854F0B" text-anchor="middle" dominant-baseline="central">summary</text>

<line x1="434" y1="88" x2="462" y2="88" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>

<rect x="464" y="70" width="190" height="36" rx="5" fill="#F1EFE8" stroke="#B4B2A9"/>
<text x="559" y="83" font-size="11" fill="#444441" text-anchor="middle" dominant-baseline="central">continue — context baked in</text>
<circle cx="474" cy="95" r="2" fill="#B4B2A9"/>
<circle cx="482" cy="95" r="2" fill="#B4B2A9"/>
<circle cx="490" cy="95" r="2" fill="#B4B2A9"/>
<circle cx="498" cy="95" r="2" fill="#B4B2A9"/>
<circle cx="506" cy="95" r="2" fill="#B4B2A9"/>
<circle cx="514" cy="95" r="2" fill="#B4B2A9"/>

<text x="190" y="125" font-size="11" fill="#888780">every thread blended together — off-topic context never leaves</text>
<line x1="24" y1="142" x2="776" y2="142" stroke="#EFEFEA"/>

<!-- ─── /fork ─── -->
<text x="24" y="171" font-size="14" font-weight="500" fill="#993C1D">/fork</text>
<text x="24" y="187" font-size="11" fill="#888780">new branch</text>

<rect x="190" y="157" width="130" height="36" rx="5" fill="#F1EFE8" stroke="#B4B2A9"/>
<text x="255" y="170" font-size="11" fill="#444441" text-anchor="middle" dominant-baseline="central">session so far</text>
<circle cx="218" cy="181" r="2" fill="#B4B2A9"/>
<circle cx="226" cy="181" r="2" fill="#B4B2A9"/>
<circle cx="234" cy="181" r="2" fill="#B4B2A9"/>
<circle cx="242" cy="181" r="2" fill="#B4B2A9"/>
<circle cx="250" cy="181" r="2" fill="#B4B2A9"/>
<circle cx="258" cy="181" r="2" fill="#B4B2A9"/>
<circle cx="266" cy="181" r="2" fill="#B4B2A9"/>

<line x1="322" y1="175" x2="350" y2="175" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>

<rect x="352" y="155" width="350" height="40" rx="5" fill="#FAECE7" stroke="#D85A30"/>
<text x="527" y="170" font-size="11" fill="#993C1D" text-anchor="middle" dominant-baseline="central">fork — carries ALL accumulated context</text>
<circle cx="362" cy="186" r="2" fill="#D8987E"/>
<circle cx="370" cy="186" r="2" fill="#D8987E"/>
<circle cx="378" cy="186" r="2" fill="#D8987E"/>
<circle cx="386" cy="186" r="2" fill="#D8987E"/>
<circle cx="394" cy="186" r="2" fill="#D8987E"/>
<circle cx="402" cy="186" r="2" fill="#D8987E"/>
<circle cx="410" cy="186" r="2" fill="#D8987E"/>
<circle cx="418" cy="186" r="2" fill="#D8987E"/>
<circle cx="426" cy="186" r="2" fill="#D8987E"/>
<circle cx="434" cy="186" r="2" fill="#D8987E"/>
<circle cx="442" cy="186" r="2" fill="#D8987E"/>
<circle cx="450" cy="186" r="2" fill="#D8987E"/>

<text x="190" y="215" font-size="11" fill="#888780">you leave the original — the fork starts burdened</text>
<line x1="24" y1="230" x2="776" y2="230" stroke="#EFEFEA"/>

<!-- ─── /new-thread ─── -->
<text x="24" y="259" font-size="14" font-weight="500" fill="#0F6E56">/new-thread</text>
<text x="24" y="275" font-size="11" fill="#888780">off-shoot</text>

<!-- Main thread — clean, unbroken, full width -->
<rect x="190" y="245" width="572" height="36" rx="5" fill="#E1F5EE" stroke="#1D9E75"/>
<text x="476" y="263" font-size="11" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">your main thread — continues uninterrupted and stays clean</text>

<!-- lean brief arrow DOWN -->
<line x1="316" y1="282" x2="316" y2="316" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#ar-sm)"/>
<rect x="308" y="285" width="10" height="8" rx="1" fill="#1D9E75" opacity="0.5"/>
<text x="302" y="313" font-size="10" fill="#0F6E56" text-anchor="end">lean brief</text>

<!-- loop-back arrow UP -->
<line x1="716" y1="318" x2="716" y2="284" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#ar-sm)"/>
<rect x="708" y="302" width="10" height="8" rx="1" fill="#1D9E75" opacity="0.5"/>
<text x="722" y="313" font-size="10" fill="#0F6E56" text-anchor="start">answer only</text>

<!-- Spawn track -->
<rect x="280" y="320" width="472" height="130" rx="6" fill="#F5FDF9" stroke="#1D9E75" stroke-dasharray="4 2"/>

<line x1="374" y1="320" x2="374" y2="450" stroke="#C8EEE0" stroke-width="1"/>
<line x1="468" y1="320" x2="468" y2="450" stroke="#C8EEE0" stroke-width="1"/>
<line x1="562" y1="320" x2="562" y2="450" stroke="#C8EEE0" stroke-width="1"/>
<line x1="656" y1="320" x2="656" y2="450" stroke="#C8EEE0" stroke-width="1"/>

<text x="327" y="340" font-size="10" fill="#5DAD8A" text-anchor="middle">research</text>
<text x="421" y="340" font-size="10" fill="#5DAD8A" text-anchor="middle">analysis</text>
<text x="515" y="340" font-size="10" fill="#5DAD8A" text-anchor="middle">drafting</text>
<text x="609" y="340" font-size="10" fill="#5DAD8A" text-anchor="middle">review</text>
<text x="694" y="340" font-size="10" fill="#5DAD8A" text-anchor="middle">done</text>

<!-- Context dots accumulating in spawn -->
<circle cx="295" cy="360" r="2.5" fill="#1D9E75" opacity="0.3"/>
<circle cx="307" cy="360" r="2.5" fill="#1D9E75" opacity="0.3"/>
<circle cx="319" cy="360" r="2.5" fill="#1D9E75" opacity="0.3"/>
<circle cx="295" cy="374" r="2.5" fill="#1D9E75" opacity="0.3"/>
<circle cx="307" cy="374" r="2.5" fill="#1D9E75" opacity="0.3"/>
<circle cx="388" cy="360" r="2.5" fill="#1D9E75" opacity="0.4"/>
<circle cx="400" cy="360" r="2.5" fill="#1D9E75" opacity="0.4"/>
<circle cx="412" cy="360" r="2.5" fill="#1D9E75" opacity="0.4"/>
<circle cx="388" cy="374" r="2.5" fill="#1D9E75" opacity="0.4"/>
<circle cx="400" cy="374" r="2.5" fill="#1D9E75" opacity="0.4"/>
<circle cx="412" cy="374" r="2.5" fill="#1D9E75" opacity="0.4"/>
<circle cx="388" cy="388" r="2.5" fill="#1D9E75" opacity="0.4"/>
<circle cx="400" cy="388" r="2.5" fill="#1D9E75" opacity="0.4"/>
<circle cx="482" cy="355" r="2.5" fill="#1D9E75" opacity="0.55"/>
<circle cx="494" cy="355" r="2.5" fill="#1D9E75" opacity="0.55"/>
<circle cx="506" cy="355" r="2.5" fill="#1D9E75" opacity="0.55"/>
<circle cx="518" cy="355" r="2.5" fill="#1D9E75" opacity="0.55"/>
