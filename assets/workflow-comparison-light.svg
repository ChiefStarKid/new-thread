<svg width="100%" viewBox="0 0 680 444" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
<title>How /compact, /fork and /new-thread each handle a session off-shoot</title>
<desc>Three stacked timelines. /compact summarises one thread in place. /fork branches the whole context and you leave the original. /new-thread keeps your main thread unbroken while a lean spawn peels off in parallel and loops the answer back.</desc>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="2" y="2" width="676" height="440" rx="12" fill="#ffffff" stroke="#E5E5E0"/>
<text x="24" y="34" font-size="16" font-weight="500" fill="#2C2C2A">Three ways to handle an off-shoot</text>
<line x1="24" y1="48" x2="656" y2="48" stroke="#E5E5E0"/>

<text x="24" y="104" font-size="15" font-weight="500" fill="#185FA5">/compact</text>
<text x="24" y="123" font-size="12" fill="#5F5E5A">one thread</text>
<rect x="190" y="90" width="150" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9"/>
<text x="265" y="110" font-size="12" fill="#444441" text-anchor="middle" dominant-baseline="central">session grows</text>
<line x1="342" y1="110" x2="372" y2="110" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="374" y="92" width="86" height="36" rx="6" fill="#FAEEDA" stroke="#EF9F27"/>
<text x="417" y="110" font-size="12" fill="#854F0B" text-anchor="middle" dominant-baseline="central">summary</text>
<line x1="462" y1="110" x2="492" y2="110" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="494" y="90" width="120" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9"/>
<text x="554" y="110" font-size="12" fill="#444441" text-anchor="middle" dominant-baseline="central">continue</text>
<text x="190" y="150" font-size="12" fill="#5F5E5A">same session, compressed in place — every thread blended together</text>
<line x1="24" y1="170" x2="656" y2="170" stroke="#EFEFEA"/>

<text x="24" y="219" font-size="15" font-weight="500" fill="#993C1D">/fork</text>
<text x="24" y="238" font-size="12" fill="#5F5E5A">new branch</text>
<rect x="190" y="205" width="150" height="40" rx="6" fill="#F1EFE8" stroke="#B4B2A9"/>
<text x="265" y="225" font-size="12" fill="#444441" text-anchor="middle" dominant-baseline="central">session so far</text>
<line x1="342" y1="225" x2="378" y2="225" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="380" y="205" width="220" height="40" rx="6" fill="#FAECE7" stroke="#D85A30"/>
<text x="490" y="225" font-size="12" fill="#993C1D" text-anchor="middle" dominant-baseline="central">fork — carries all context</text>
<text x="190" y="265" font-size="11" fill="#B4B2A9">original left behind</text>
<text x="380" y="265" font-size="12" fill="#5F5E5A">you move here; the entire history comes with you</text>
<line x1="24" y1="288" x2="656" y2="288" stroke="#EFEFEA"/>

<text x="24" y="346" font-size="15" font-weight="500" fill="#0F6E56">/new-thread</text>
<text x="24" y="365" font-size="12" fill="#5F5E5A">off-shoot</text>
<rect x="190" y="302" width="410" height="40" rx="6" fill="#E1F5EE" stroke="#1D9E75"/>
<text x="395" y="322" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">your session — continues uninterrupted</text>
<line x1="350" y1="343" x2="350" y2="372" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="430" y1="372" x2="430" y2="343" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="344" y="360" font-size="11" fill="#0F6E56" text-anchor="end">lean brief</text>
<text x="436" y="360" font-size="11" fill="#0F6E56" text-anchor="start">loop-back</text>
<rect x="300" y="373" width="180" height="34" rx="6" fill="#ffffff" stroke="#1D9E75"/>
<text x="390" y="390" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">spawn — one task, clean</text>
<text x="190" y="428" font-size="12" fill="#5F5E5A">main thread never breaks; the answer returns when ready</text>
</svg>
