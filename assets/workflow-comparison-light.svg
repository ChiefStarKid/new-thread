<circle cx="494" cy="369" r="2.5" fill="#1D9E75" opacity="0.55"/>
<circle cx="506" cy="369" r="2.5" fill="#1D9E75" opacity="0.55"/>
<circle cx="482" cy="383" r="2.5" fill="#1D9E75" opacity="0.55"/>
<circle cx="494" cy="383" r="2.5" fill="#1D9E75" opacity="0.55"/>
<circle cx="482" cy="397" r="2.5" fill="#1D9E75" opacity="0.55"/>
<circle cx="576" cy="350" r="2.5" fill="#1D9E75" opacity="0.7"/>
<circle cx="588" cy="350" r="2.5" fill="#1D9E75" opacity="0.7"/>
<circle cx="600" cy="350" r="2.5" fill="#1D9E75" opacity="0.7"/>
<circle cx="612" cy="350" r="2.5" fill="#1D9E75" opacity="0.7"/>
<circle cx="624" cy="350" r="2.5" fill="#1D9E75" opacity="0.7"/>
