<circle cx="612" cy="364" r="2.5" fill="#1D9E75" opacity="0.7"/>
<circle cx="576" cy="378" r="2.5" fill="#1D9E75" opacity="0.7"/>
<circle cx="588" cy="378" r="2.5" fill="#1D9E75" opacity="0.7"/>
<circle cx="600" cy="378" r="2.5" fill="#1D9E75" opacity="0.7"/>
<circle cx="576" cy="392" r="2.5" fill="#1D9E75" opacity="0.7"/>
<circle cx="588" cy="392" r="2.5" fill="#1D9E75" opacity="0.7"/>
<circle cx="576" cy="406" r="2.5" fill="#1D9E75" opacity="0.7"/>

<text x="516" y="430" font-size="10" fill="#5DAD8A" text-anchor="middle">context accumulates here — not in your main thread</text>
<text x="516" y="446" font-size="11" font-weight="500" fill="#0F6E56" text-anchor="middle">spawn — long independent run</text>

<text x="190" y="478" font-size="11" fill="#5F5E5A">the answer alone returns — your main thread never felt the weight</text>

<rect x="190" y="492" width="572" height="50" rx="5" fill="#F8F8F5" stroke="#EFEFEA"/>
<text x="476" y="511" font-size="11" fill="#888780" text-anchor="middle">/fork + /compact: off-topic context bleeds into every future turn</text>
<text x="476" y="529" font-size="11" fill="#0F6E56" text-anchor="middle">/new-thread: off-topic context lives only in the spawn — main thread stays focused</text>

</svg>
